<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OGP Image - むなかた総理</title>
  <style>
    :root {
      --sumi: #11100e;
      --paper: #f5f0e6;
      --gold: #b98b49;
      --red: #c64032;
      --blue: #6da4c8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      overflow: hidden;
      background: var(--sumi);
    }

    body {
      color: var(--paper);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    }

    .og-card {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 58px 68px;
      overflow: hidden;
      isolation: isolate;
      background: var(--sumi);
    }

    .og-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background-image:
        linear-gradient(90deg, rgba(17, 16, 14, 0.95) 0%, rgba(17, 16, 14, 0.78) 39%, rgba(17, 16, 14, 0.18) 82%),
        linear-gradient(0deg, rgba(17, 16, 14, 0.92) 0%, rgba(17, 16, 14, 0.22) 55%),
        url("assets/munakata-hero.png");
      background-size: cover;
      background-position: center;
    }

    .og-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(rgba(245, 240, 230, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 240, 230, 0.045) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: linear-gradient(90deg, #000 0%, #000 52%, transparent 86%);
    }

    .topline {
      display: flex;
      align-items: center;
      gap: 16px;
      color: rgba(245, 240, 230, 0.84);
      font-size: 24px;
      font-weight: 800;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border: 2px solid rgba(245, 240, 230, 0.58);
      color: var(--red);
      font-family: "Hiragino Mincho ProN", serif;
      font-size: 32px;
      line-height: 1;
      transform: rotate(-7deg);
    }

    h1 {
      width: 690px;
      margin: 48px 0 0;
      font-family: Georgia, "Times New Roman", "Hiragino Mincho ProN", serif;
      font-size: 132px;
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: 0;
    }

    .copy {
      width: 700px;
      margin: 30px 0 0;
      color: rgba(245, 240, 230, 0.83);
      font-size: 30px;
      font-weight: 700;
      line-height: 1.45;
    }

    .site {
      position: absolute;
      left: 70px;
      bottom: 52px;
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
    }

    .seal {
      position: absolute;
      right: 74px;
      bottom: 58px;
      display: grid;
      place-items: center;
      width: 150px;
      height: 150px;
      border: 4px solid rgba(198, 64, 50, 0.95);
      color: rgba(255, 111, 93, 0.95);
      font-family: "Hiragino Mincho ProN", serif;
      font-size: 40px;
      font-weight: 900;
      line-height: 1.08;
      text-align: center;
      transform: rotate(8deg);
      mix-blend-mode: screen;
    }

    .rule {
      position: absolute;
      left: 68px;
      top: 138px;
      width: 220px;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
  </style>
</head>
<body>
  <main class="og-card" aria-label="むなかた総理 OGP画像">
    <div class="topline">
      <div class="mark">宗</div>
      <span>Portfolio of Munakata Prime</span>
    </div>
    <div class="rule" aria-hidden="true"></div>
    <h1>むなかた<br>総理</h1>
    <p class="copy">構想を政策に、政策を体験に。企画、文章、デザイン、実装まで。</p>
    <div class="site">munakata-eng.github.io/website-ogp-test/</div>
    <div class="seal" aria-hidden="true">即日<br>決裁</div>
  </main>
</body>
</html>
